# Parity comparison: new Python image-inferrer (shadow index) vs the Scala
# inferrer's prod output, for the same image ids.
#
# Prerequisite: in the gitignored configs/source_configuration.yaml, define a
# cluster for the catalogue 2025-10-02 pipeline ES and these two index_sources,
# using an API key with read on BOTH indices (e.g. the `read_only` key from
# elasticsearch/pipeline_storage_2025-10-02/read_only/api_key):
#
#   clusters:
#     pipeline-2025-10-02:
#       cloud_id: "<cloud-id-of-0687c4947f404fe8ae10fa1aeab71bdc.eu-west-1.aws.found.io>"
#       api_key:  "<read_only api key>"
#   index_sources:
#     prod-images-augmented:
#       cluster: pipeline-2025-10-02
#       index:   images-augmented-2026-04-29
#     shadow-images-augmented:
#       cluster: pipeline-2025-10-02
#       index:   images-augmented-2026-06-15

# Exactly two index sources to compare.
index_sources:
  - prod-images-augmented
  - shadow-images-augmented

# Restrict to the ids the parity run populated in the shadow index (replace the
# placeholders with the run's image ids). Omit this block to compare the full
# id intersection of the two indices.
filter_query:
  query:
    ids:
      values:
        - "<shadow-image-id-1>"
        - "<shadow-image-id-2>"

# Fields that legitimately differ between the Scala and Python runs and so are
# excluded from the comparison. Everything else (inferredData
# features/averageColorHex/aspectRatio, source/locations data values, version,
# modifiedTime) is expected to match exactly -- those are the fields that would
# reveal a real regression.
ignore_fields:
  # Per-run wall-clock timestamp.
  - state.augmentedTime
  - state.**.augmentedTime
  # The palette encoder is non-deterministic BY DESIGN: it adds unseeded Gaussian
  # noise to every pixel (np.random.normal, no seed) in palette_inferrer's
  # palette_encoder.py, so paletteEmbedding differs on every run regardless of
  # the input. Neither value is "more correct"; it can never match exactly.
  - state.inferredData.paletteEmbedding
  # `type` discriminators on the copied source/locations blocks. The Python
  # pydantic models emit `type` literal defaults (e.g. DigitalLocation, Identified)
  # that the Scala stored shape omits (or vice versa). This is cosmetic: the image
  # ingestor re-derives these tags from its own model defaults on read (parsing is
  # lenient -- extras ignored, missing tags defaulted), so the indexed output and
  # API result are identical. Data VALUES under source/locations are still compared.
  - source.type
  - source.**.type
  - locations[].type

sample_size: 20
hash_bucket_count: 2
namespace: image-inferrer-parity
output_dir: data
