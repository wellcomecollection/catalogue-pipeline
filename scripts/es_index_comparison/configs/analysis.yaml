# Example configuration for es_index_comparison
# ------------------------------------------------------------
# Copy this file and modify values to create independent analyses.
# Each run produces its own namespace directory under output_dir.
# ------------------------------------------------------------

# Exactly TWO index sources to compare (required)
# These identifiers must exist in source_configuration.yaml
index_sources:
  - images-indexed-2025-10-02
  - images-indexed-2026-04-29

# Optional Elasticsearch query DSL (omit for match_all). This example filters
# documents where a nested term matches a specific identifier type.
# filter_query:
#   query:

# Ignore field path patterns (wildcards & list index insensitive tokens allowed)
# Pattern language:
#   state.modifiedTime              -> exact path
#   state.*.modifiedTime            -> match one segment
#   state.**.modifiedTime           -> match any depth
#   data.production[].dates[].range.from -> ignore all list indices for those segments
# Descendants of a matched path are also ignored implicitly.
ignore_fields:
  # We expect these timestamps to be different
  - debug.indexedTime
  - modifiedTime

  # The new index uses the graph for label standardisation, concept deduplication, and ID-based
  # source concept matching, so we expect these to differ
  - aggregatableValues.source.contributors
  - aggregatableValues.source.subjects
  - aggregatableValues.source.genres
  - display.source.genres
  - display.source.contributors
  - display.source.subjects
  - query.source.subjects
  - query.source.contributors
  - query.source.genres
  - filterableValues.source.subjects
  - filterableValues.source.contributors
  - filterableValues.source.genres

  # In the new index, we include the canonical ID in the list (see https://github.com/wellcomecollection/catalogue-pipeline/pull/3148)
  - query.source.identifiers.value

  # In the new index, we include image IDs on the source work
  - query.source.images.id
  - query.source.images.identifiers.value

  # In the existing index, work hierarchy fields are sometimes incorrect
  - query.source.partOf.title
  - query.source.collectionPath.path

  # The existing index sometimes stores outdated item IDs
  - query.source.items.id
  - query.source.items.identifiers.value

  # The Python ingestor does not deduplicate licenses. Here is a fix: https://github.com/wellcomecollection/catalogue-pipeline/pull/3367
  - aggregatableValues.locations.license

  # Number of differing documents to sample for console display
sample_size: 10

# Rows per Parquet shard flush during conversion
loading_chunk_size: 100000

# Number of hash buckets for Parquet partitioning (controls compare-memory usage)
hash_bucket_count: 6

# Optional namespace override; if omitted a timestamped one is generated from filename
# namespace: pipeline-comparison-ebsco

# Base output directory (created if missing)
output_dir: data
